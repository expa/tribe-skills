<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Tribe — OG card</title>
<style>
  /* Tribe brand tokens — mirror of lib/colors.tsx (see tribe-brand skill). */
  :root {
    --paper: #FAFAF8; --ink: #06141B; --ink-2: #050F15;
    --brand: #65D9EE; --brand-contrast: #07404F;
    --accent-orange: #FF7C0F;
    --serif: "TribeSerif", ui-serif, Georgia, "Times New Roman", serif;
    --sans: "TribeSans", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --caption: "TribeCaption", var(--sans);
  }
  /* Real brand fonts, shipped with the skill (paths relative to this HTML). */
  @font-face { font-family:"TribeSerif"; src:url("../../brand/assets/fonts/TribeSerif-Light.otf") format("opentype"); font-weight:300; }
  @font-face { font-family:"TribeSans";  src:url("../../brand/assets/fonts/TribeSans-Light.woff2") format("woff2"); font-weight:300; }
  @font-face { font-family:"TribeSans";  src:url("../../brand/assets/fonts/TribeSans-Regular.woff2") format("woff2"); font-weight:400; }
  @font-face { font-family:"TribeCaption"; src:url("../../brand/assets/fonts/TribeCaption-Regular.woff2") format("woff2"); font-weight:400; }
  * { box-sizing: border-box; margin: 0; }
  body { background: #444; display: grid; place-items: center; min-height: 100vh; }

  /* The export surface. Screenshot THIS element. Change w/h for other sizes. */
  .frame {
    width: 1200px; height: 630px;
    background: var(--paper); color: var(--ink);
    position: relative; overflow: hidden;
    padding: 72px; display: flex; flex-direction: column; justify-content: space-between;
    font-family: var(--sans);
  }

  /* Node-graph / orbital motif — thin rails + brand-cyan dots, bleeding off the
     right edge. Subtle, never centered clip-art. */
  .motif { position: absolute; right: -120px; top: -80px; width: 560px; height: 560px;
           opacity: 0.9; pointer-events: none; }
  .motif circle.dot { fill: var(--brand); }
  .motif circle.node { fill: var(--ink); }
  .motif line { stroke: var(--ink); stroke-opacity: 0.15; stroke-width: 1.5; }

  .eyebrow { font-family: var(--caption); font-size: 18px; font-weight: 400;
             letter-spacing: 2.4px; text-transform: uppercase; color: var(--ink); }
  .headline { font-family: var(--serif); font-weight: 300; font-size: 68px;
              line-height: 1.08; text-wrap: balance; max-width: 14ch; position: relative; }
  .support { font-family: var(--sans); font-weight: 300; font-size: 24px; line-height: 1.5;
             color: rgb(6 20 27 / 0.7); max-width: 46ch; }

  .foot { display: flex; align-items: center; justify-content: space-between; }
  .wordmark { font-family: var(--serif); font-weight: 300; font-size: 26px; letter-spacing: 0.5px; }
  .meta { font-family: var(--caption); font-size: 15px; letter-spacing: 1.4px;
          text-transform: uppercase; color: rgb(6 20 27 / 0.55); }
</style>
</head>
<body>
  <div class="frame">
    <!-- Orbital motif (swap dot positions freely; keep it sparse and off-edge). -->
    <svg class="motif" viewBox="0 0 560 560" aria-hidden="true">
      <line x1="120" y1="120" x2="300" y2="240" />
      <line x1="300" y1="240" x2="200" y2="380" />
      <line x1="300" y1="240" x2="440" y2="180" />
      <line x1="200" y1="380" x2="360" y2="430" />
      <circle class="node" cx="300" cy="240" r="6" />
      <circle class="dot"  cx="120" cy="120" r="9" />
      <circle class="dot"  cx="440" cy="180" r="7" />
      <circle class="dot"  cx="200" cy="380" r="11" />
      <circle class="dot"  cx="360" cy="430" r="6" />
      <circle class="node" cx="470" cy="330" r="4" />
    </svg>

    <p class="eyebrow">AI Consulting &amp; Talent Network</p>

    <div>
      <h1 class="headline">Build AI that earns its place in the business.</h1>
    </div>

    <p class="support">Senior practitioners and a network model that puts the
      right people on the hardest problems.</p>

    <div class="foot">
      <span class="wordmark">Tribe</span>
      <span class="meta">tribe.ai</span>
    </div>
  </div>
</body>
</html>
